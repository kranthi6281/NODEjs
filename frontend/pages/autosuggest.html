<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Suggest</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
   
}

body{
    background:#fff;
}

/* ---------- Top Bar ---------- */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 30px;
}

.settings{
    font-size:24px;
    cursor:pointer;
}

.status{
    font-size:18px;
}

/* ---------- Main Content ---------- */

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-top:50px;
}

.being{
    color:purple;
}

.container h1{
    font-size:60px;
    margin-bottom:20px;
}

.container p{
    color:#8a8a8a;
    font-size:22px;
    margin-bottom:40px;
}

/* ---------- Search ---------- */

.search{
    display:flex;
    align-items:flex-start;
    gap:12px;
}

.search-icon{
    font-size:24px;
    margin-top:13px;
    color:#666;
}

.search-wrapper{
    position:relative;
    width:550px;
}

.search-box{
    width:100%;
    height:52px;
    padding:0 20px;
    font-size:16px;

    border:2px solid #222;
    border-radius:30px;

    outline:none;
    transition:.3s;
}

.search-box:focus{
    border-color :purple;
    box-shadow:0 0 10px rgba(65,161,229,.25);
}

.search-box::placeholder{
    color:#9d9d9d;
}

/* ---------- Suggestion Box ---------- */

#suggestion-box{

    position:absolute;
    top:60px;
    left:0;

    width:100%;

    background:white;

    border:1px solid #ddd;
    

    box-shadow:0 8px 25px rgba(0,0,0,.12);

    overflow:hidden;

    display:none;

    z-index:100;
}

.suggestion{
    padding:14px 18px;
    font-size:16px;
    cursor:pointer;
    text-align:left;
}

.suggestion:hover{
    background:#f5f5f5;
}

</style>

</head>

<body>

<div class="top-bar">

    <span class="settings">&#9881;</span>

    <span class="status">
        &#x2022; Online &nbsp; | &nbsp; &#128339; - ms
    </span>

</div>

<div class="container">

    <h1><span class="being">Being</span>Infinity</h1>

    <p>
        One million phrases. Four algorithms. Prefix Based Auto Suggest.
    </p>

    <div class="search">

        <span class="search-icon">&#128269;</span>

        <div class="search-wrapper">

            <input
                class="search-box"
                type="text"
                placeholder="Start Typing to Search">

            <div id="suggestion-box">

                <div class="suggestion">Suggestion box</div>
            </div>
        </div>
    </div>
</div>
<script>
const input = document.querySelector(".search-box");
const suggestions = document.getElementById("suggestion-box");
input.addEventListener("focus",function(){
    suggestions.style.display="block";
});
input.addEventListener("blur",function(){
    setTimeout(function(){
        suggestions.style.display="none";
    },150);
});
const items=document.querySelectorAll(".suggestion");
items.forEach(function(item){

    item.addEventListener("click",function(){
        input.value=this.innerText;
        suggestions.style.display="none";
    });
});
</script>
</body>
</html>
